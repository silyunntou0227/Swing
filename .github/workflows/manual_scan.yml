name: Manual Stock Scan

on:
  workflow_dispatch:
    inputs:
      log_level:
        description: 'Log level'
        required: false
        default: 'INFO'
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test V2 API endpoints
        run: |
          python3 -c "
          import requests, os
          key = os.environ['JQUANTS_API_KEY']
          headers = {'x-api-key': key}
          endpoints = [
              '/v2/equities/listed',
              '/v2/equities/bars/daily?date=2026-03-17',
              '/v2/fins/statements',
              '/v2/fins/announcement',
              '/v2/listed/info',
              '/v2/prices/daily_quotes?date=20260317',
          ]
          for ep in endpoints:
              try:
                  r = requests.get(f'https://api.jquants.com{ep}', headers=headers, timeout=10)
                  print(f'{r.status_code} {ep} -> keys: {list(r.json().keys())[:5] if r.status_code == 200 else r.text[:100]}')
              except Exception as e:
                  print(f'ERR {ep} -> {e}')
          "
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}

      - name: Run stock scan
        run: python -m src.main
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          LOG_LEVEL: ${{ inputs.log_level }}
