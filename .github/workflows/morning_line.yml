name: Morning LINE Notification

on:
  schedule:
    # UTC 22:30 = JST 07:30（朝の通知）日〜木 → JST 月〜金の朝
    - cron: '30 22 * * 0-4'
  workflow_dispatch:

env:
  TZ: Asia/Tokyo

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan and send LINE notification (全銘柄)
        run: python -m src.main --channel line
        env:
          MAX_STOCKS: "0"
          ANALYSIS_WORKERS: "2"
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"Morning LINE FAILED: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
