name: Multi-Period Backtest (5yr x 20)

on:
  workflow_dispatch:
    inputs:
      max_stocks:
        description: 'Max stocks to analyze'
        required: false
        default: '800'

env:
  TZ: Asia/Tokyo

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run multi-period backtest
        run: python backtest_multi.py
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
